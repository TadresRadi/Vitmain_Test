
services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: vitmain_db
    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - vitmain_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: vitmain_redis
    restart: always

    volumes:
      - redis_data:/data

    networks:
      - vitmain_network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Django Backend
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: vitmain_backend
    restart: always

    env_file:
      - .env

    environment:
      DB_HOST: db
      DB_PORT: 5432

      REDIS_URL: redis://redis:6379/1

      RUNNING_IN_DOCKER: "1"

    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - vitmain_network

    ports:
      - "8000:8000"

  # ==========================================
  # Frontend
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        BACKEND_URL: http://backend:8000

    container_name: vitmain_frontend
    restart: always

    depends_on:
      - backend

    networks:
      - vitmain_network

    ports:
      - "80:80"