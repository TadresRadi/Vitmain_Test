name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # Package Frontend + Backend into ZIP
      - name: Prepare Package Directory
        run: |
          mkdir -p build-package/frontend
          mkdir -p build-package/backend
          
          # Copy Frontend built assets
          cp -r frontend/dist build-package/frontend/
          
          # Copy Backend files (excluding venv, logs, __pycache__, tests, local env files)
          rsync -av --exclude='venv' --exclude='__pycache__' --exclude='tests' --exclude='.env' --exclude='.env.local' --exclude='*.log' backend/ build-package/backend/
          
          # Copy Root configuration files
          cp DEPLOYMENT_GUIDE.md build-package/ || true
          cp docker-compose.yml build-package/ || true

      - name: Create ZIP Archive
        run: |
          cd build-package
          zip -r ../vitmain-production-${{ github.ref_name }}.zip .

      # Create draft release and upload asset
      - name: Create Draft Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            vitmain-production-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
