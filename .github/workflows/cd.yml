name: CD Pipeline (Continuous Delivery)

on:
  push:
    branches: [ main, master ]

jobs:
  # Build assets & Package application
  package:
    name: Package Assets & Create ZIP Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Node and build Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # Package Frontend + Backend into a ZIP
      - name: Prepare Package Directory
        run: |
          mkdir -p build-package/frontend
          mkdir -p build-package/backend
          
          # Copy Frontend built assets
          cp -r frontend/dist build-package/frontend/
          
          # Copy Backend files (excluding venv, logs, __pycache__, test files, local env files)
          rsync -av --exclude='venv' --exclude='__pycache__' --exclude='tests' --exclude='.env' --exclude='.env.local' --exclude='*.log' backend/ build-package/backend/
          
          # Copy Root configuration files
          cp DEPLOYMENT_GUIDE.md build-package/ || true
          cp docker-compose.yml build-package/ || true

      - name: Create ZIP Artifact
        run: |
          cd build-package
          zip -r ../vitmain-production.zip .
          
      - name: Upload Production ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitmain-production-package
          path: vitmain-production.zip
          retention-days: 14

  # Build Docker Images to verify they compile
  docker-build:
    name: Build & Verify Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Backend Image
      - name: Build Backend Docker Image (Verify)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: vitmain-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Frontend Image
      - name: Build Frontend Docker Image (Verify)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: vitmain-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
