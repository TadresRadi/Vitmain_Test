name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8
        run: |
          flake8 backend || true

  tests:
    name: Tests (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vitmain_test
        options: >-
          --health-cmd "pg_isready -U postgres -d vitmain_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/vitmain_test
      DB_NAME: vitmain_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/1
      SECRET_KEY: ci-secret-key
      DEBUG: 'false'
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-django
      - name: Run migrations & tests
        working-directory: backend
        run: |
          python manage.py migrate --noinput
          python manage.py test --verbosity=2

  security:
    name: Security checks (pip-audit + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install pip-audit & bandit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit
      - name: Run pip-audit
        run: pip-audit --progress-spinner=off || true
      - name: Run bandit
        run: bandit -r backend -n 5 || true