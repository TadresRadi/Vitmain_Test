name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: "pip"
      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff
        run: |
          ruff check backend

  tests:
    name: Tests (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vitmain_test
        options: >-
          --health-cmd "pg_isready -U postgres -d vitmain_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/vitmain_test
      DB_NAME: vitmain_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/1
      SECRET_KEY: ci-secret-key
      DEBUG: 'false'
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      VODAFONE_WEBHOOK_SECRET_TOKEN: ci-test-token
      VODAFONE_RECEIVER_NUMBER: "01000000000"

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-django
      - name: Run migrations & tests
        working-directory: backend
        run: |
          python manage.py migrate --noinput
          python manage.py test --verbosity=2