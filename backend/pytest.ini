[pytest]
DJANGO_SETTINGS_MODULE = backend.settings
python_files = tests.py test_*.py *_tests.py
addopts = --reuse-db --strict-markers -q --cov=backend --cov-report=term-missing
markers =
    money: tests that handle payment/subscription money flow
    webhook: tests for inbound webhooks
    slow: long-running tests
testpaths =
    core
    users
    payments
    subscriptions
    chat
    onboarding