groups:
  - name: vitmain.rules
    rules:
      - alert: High5xxRate
        expr: rate(django_http_responses_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx rate"
          description: "High 5xx rate detected over 5 minutes."

      - alert: HighErrorRate
        expr: increase(vitmain_api_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Spike in application errors"