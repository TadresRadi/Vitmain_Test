global:
  resolve_timeout: 5m

# Route alerts to different receivers based on severity.
route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts go to Slack (if configured) + webhook
    - matchers:
        - severity = "critical"
      receiver: 'critical'
    # Warning alerts go to the default webhook
    - matchers:
        - severity = "warning"
      receiver: 'default'

receivers:
  - name: 'default'
    # Webhook receiver for local testing / development.
    # In production, point this at your incident management tool
    # (PagerDuty, OpsGenie, etc.) via the ALERTMANAGER_WEBHOOK_URL env var.
    webhook_configs:
      - url: 'http://localhost:5001/'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://localhost:5001/'
        send_resolved: true
    # Slack is configured via environment variable at runtime.
    # If SLACK_WEBHOOK_URL is not set, this receiver silently does nothing
    # for Slack (the webhook above still fires).
    # To enable Slack in production:
    #   docker run -e SLACK_WEBHOOK_URL=https://hooks.slack.com/... alertmanager
    # Or mount a secret-containing file at /etc/alertmanager/secrets/