global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # If your app is running on host machine and Docker uses host.docker.internal
  - job_name: 'vitmain-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']  # adjust for your dev/setup

  # Scrape grafana (optional)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']